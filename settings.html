<div class="ta-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Theme Assist ༊༄.°</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <p>Auto-apply active — new themes apply on import.</p>
            <small>Last applied: <span id="ta_last_applied"></span></small>
            <hr>
            <div class="ta-buttons">
                <div id="ta_theme_manager_btn" class="menu_button menu_button_icon interactable">
                    <i class="fa-solid fa-palette"></i>
                    <span>Theme Manager</span>
                </div>
            </div>
            <div class="ta-buttons" style="margin-top:5px;">
                <div id="ta_backup_btn" class="menu_button menu_button_icon interactable">
                    <i class="fa-solid fa-box-archive"></i>
                    <span>Backup All</span>
                </div>
                <div id="ta_restore_btn" class="menu_button menu_button_icon interactable">
                    <i class="fa-solid fa-file-import"></i>
                    <span>Restore</span>
                </div>
            </div>
            <hr>
            <small><b>Quick Favorites:</b></small>
            <div id="ta_favorites_list" class="ta-fav-list"></div>
        </div>
    </div>
</div>
